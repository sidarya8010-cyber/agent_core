name: Deploy AgentCore

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate AWS region
        run: |
          if [ -z "${AWS_REGION}" ]; then
            echo "AWS_REGION is empty. Set the AWS_REGION secret or repository variable." >&2
            exit 1
          fi
          echo "Using AWS region: ${AWS_REGION}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy AgentCore runtime
        env:
          AGENTCORE_SUPPRESS_RECOMMENDATION: 1
        run: |
          agentcore configure --entrypoint 01_agentcore_runtime.py --name agentcore_runtime_01 --non-interactive
          agentcore deploy --agent agentcore_runtime_01 --env GROQ_API_KEY=$GROQ_API_KEY
